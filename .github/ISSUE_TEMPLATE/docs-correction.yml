name: Documentation correction
description: Report a typo, unclear instruction, broken link, or public documentation issue.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this public documentation.

        Do not submit private case materials, identity documents, wallet access materials, seed phrases, private keys, police reports, exchange screenshots with personal information, or confidential evidence.
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Which page or file should be corrected?
      placeholder: docs/zh-CN/...
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be corrected?
      description: Describe the typo, broken link, unclear instruction, or outdated public reference.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording
      description: If you have suggested wording, paste it here.
    validations:
      required: false
